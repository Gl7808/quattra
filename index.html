<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Quattras</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://api-maps.yandex.ru/v3/?apikey=a20f7a59-3e1d-4b55-ad79-0629fc440ba9&lang=ru_RU"></script>
    <script src="./scripts/main.js" type="module" defer></script>
</head>
<body>


<!--/////////////////////////////-->
    <header class="header">
        <div class="header__inner large__container">
            <a class="header__logo logo">
                <span class="logo__text">Quatt<span class="header__logo__accent">ra</span></span>
            </a>
            <nav class="header__menu hidden-mobile">
                <ul class="header__menu-list">
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link is-active">Главная</a>
                    </li>
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link">События</a>
                    </li>
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link">Цены</a>
                    </li>
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link">О нас</a>
                    </li>
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link">Новости</a>
                    </li>
                    <li class="header__menu-item">
                        <a href="#" class="header__menu-link">Вакансии</a>
                    </li>
                </ul>
            </nav>
            <button class="header__burger-button burger-button visible-mobile"
                    type="button"
                    onclick="mobileOverlay.showModal()">
                <span class="visually-hidden">Open navigation menu</span>
            </button>
        </div>
    </header>
<!--/////////////////////////////-->



    <main class="content">
        <section class="hero">
            <div class="container hero__container">
                <h1 class="hero__title">Заголовок первого экрана</h1>
                <a href="#" class="button hero__button">Кнопка действия</a>
            </div>
        </section>
    </main>

<!--/////////////////////////////-->
    <footer class="footer large__container">
        <div class="footer__inner">
            <div class="social">
                <ul class="social__list">
                    <li class="social__item">
                        <a href="#" class="social__link">VK</a>
                    </li>
                    <li class="social__item">
                        <a href="#" class="social__link">TG</a>
                    </li>
                    <li class="social__item">
                        <a href="#" class="social__link">DC</a>
                    </li>
                </ul>
            </div>
            <div class="rights visually-hidden">
                <div class="rights__body">
                    <span class="rights__text">
                        Copyright © 2026. All rights reserved.
                    </span>
                </div>
            </div>
        </div>
    </footer>
<!--/////////////////////////////-->




<!--/////////////////////////////-->
    <dialog class="mobile-overlay visible-mobile" id="mobileOverlay">
        <form class="mobile-overlay__close-button-wrapper" method="dialog">
            <button
                    class="mobile-overlay__close-button cross-button"
                    type="submit"
            >
                <span class="visually-hidden">Close navigation menu</span>
            </button>
        </form>
        <div class="mobile-overlay__body">
            <ul class="mobile-overlay__list">
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">Главная</a>
                </li>
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">События</a>
                </li>
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">Цены</a>
                </li>
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">О нас</a>
                </li>
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">Новости</a>
                </li>
                <li class="mobile-overlay__item">
                    <a class="mobile-overlay__link" href="/">Вакансии</a>
                </li>
            </ul>
        </div>
    </dialog>
</body>
</html>
